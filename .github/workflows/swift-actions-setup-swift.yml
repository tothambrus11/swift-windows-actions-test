name: swift-actions/setup-swift

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.channel }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, windows-11-arm]
        channel: [release, dev-snapshot]
        include:
          - channel: release
            swift-version: "6.3.1"
          - channel: dev-snapshot
            swift-version: "main-snapshot"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift via swift-actions/setup-swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: ${{ matrix.swift-version }}

      - name: swift --version
        run: swift --version

      - name: swift build
        run: swift build -c release

      - name: swift run
        run: swift run -c release Hello
